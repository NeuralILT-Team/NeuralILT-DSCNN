# Depthwise Separable CNN (DS-CNN) U-Net configuration
# Proposed efficient architecture per CMPE 257 project proposal

model:
  name: dscnn
  in_channels: 1
  out_channels: 1
  features: [64, 128, 256, 512]  # Same depth as baseline for fair comparison

training:
  epochs: 50
  batch_size: 16
  learning_rate: 1.0e-4
  weight_decay: 0.0
  optimizer: adam
  scheduler:
    type: cosine
    min_lr: 1.0e-6
  loss: mse
  grad_clip: 1.0

# Checkpoint and logging
checkpoint_dir: results/checkpoints/dscnn
log_dir: results/logs/dscnn
save_every: 10

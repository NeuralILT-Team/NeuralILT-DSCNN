# Baseline U-Net configuration
# Standard convolution encoder-decoder as per LithoBench NeuralILT
#
# SJSU HPC GPU: 12GB VRAM
# With [64,128,256,512] + batch=4 the model OOMs on 12GB even with AMP.
# Reduced to [32,64,128,256] + batch=2 which fits comfortably.
# Effective batch = 2 * 8 = 16 via gradient accumulation.

model:
  name: baseline
  in_channels: 1
  out_channels: 1
  features: [32, 64, 128, 256]  # reduced from [64,128,256,512] — 12GB GPU

training:
  epochs: 50
  batch_size: 2           # reduced from 4 — 12GB GPU OOM at batch=4
  learning_rate: 1.0e-4
  weight_decay: 0.0
  optimizer: adam
  scheduler:
    type: cosine
    min_lr: 1.0e-6
  loss: mse
  grad_clip: 1.0
  mixed_precision: true   # use float16 to halve memory
  grad_accumulation: 8    # effective batch size = 2 * 8 = 16

# Checkpoint and logging
checkpoint_dir: results/checkpoints/baseline
log_dir: results/logs/baseline
save_every: 10

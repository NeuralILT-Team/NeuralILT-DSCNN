# Docker Compose for NeuralILT-DSCNN
#
# Usage:
#   docker-compose run preprocess    # Preprocess dataset
#   docker-compose run train-baseline  # Train baseline
#   docker-compose run train-dscnn     # Train DS-CNN
#   docker-compose run evaluate        # Compare models

version: "3.8"

services:
  preprocess:
    build: .
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    command: bash scripts/run_preprocess.sh

  train-baseline:
    build: .
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    command: bash scripts/run_baseline.sh

  train-dscnn:
    build: .
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    command: bash scripts/run_dscnn.sh

  evaluate:
    build: .
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    command: bash scripts/run_eval.sh compare

  visualize:
    build: .
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    command: bash scripts/run_visualize.sh curves

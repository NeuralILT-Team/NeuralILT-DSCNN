services:
  preprocess:
    build:
      context: .
      dockerfile: Dockerfile
    image: ilt-dscnn:latest
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      MAX_SAMPLES: ${MAX_SAMPLES:-}
    command: bash scripts/run_preprocess.sh

  train_baseline:
    build:
      context: .
      dockerfile: Dockerfile
    image: ilt-dscnn:latest
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      MAX_SAMPLES: ${MAX_SAMPLES:-}
      BATCH_SIZE: ${BATCH_SIZE:-2}
      EPOCHS: ${EPOCHS:-5}
      LR: ${LR:-1e-4}
    command: bash scripts/run_baseline.sh

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ilt-dscnn:latest
    working_dir: /app
    volumes:
      - ./:/app
    environment:
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: 7860
    ports:
      - "7860:7860"
    command: python -m src.app
